name: 缺陷报告 / Bug report
description: 报告技能触发、流程或输出中的问题。
title: "[Bug]: "
labels:
  - bug
  - needs triage
body:
  - type: textarea
    id: context
    attributes:
      label: 问题场景 / Context
      description: 请说明使用的语言版本、输入内容及预期任务。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / Actual result
      description: 请移除敏感信息后粘贴实际输出。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果 / Expected result
    validations:
      required: true
